<div class="container-fluid">
  <div class="row row-content">
    <div class="col-xs-12 col-xl-6">
      <h1>Command {{ commandModel().command }}</h1>
      <form novalidate>
        <fieldset class="form-group form-check">
          <input type="checkbox" class="form-check-input" id="callable" [formField]="form.callable">
          <label class="form-check-label" for="callable">Callable</label>
        </fieldset>
        <fieldset class="form-group">
          <label for="command">Command</label>
          <input type="text" class="form-control" id="command" [formField]="form.command">
        </fieldset>
        <fieldset class="form-group">
          <label for="methodName">Method name @if (commandModel().methodName.length > 0) {
            <a
              [routerLink]="['/methods', commandModel().methodName]">{{ commandModel().methodName }}</a>
          }</label>
          <input type="text" class="form-control" id="methodName" [formField]="form.methodName">
        </fieldset>
        <fieldset class="form-group">
          <label for="room">Room @if (commandModel().room !== null) {
            <a
              [routerLink]="['/rooms', commandModel().room]">{{ commandModel().room }}</a>
          }</label>
          <input type="number" class="form-control" id="room" [formField]="form.room">
        </fieldset>
        <fieldset class="form-group">
          <label for="owner">Owner</label>
          <input type="text" class="form-control" id="owner" [formField]="form.owner">
        </fieldset>
        <div class="col-xs-12 col-sm-12 text-right">
          <button type="submit" class="mx-1 btn btn-primary"
                  (click)="updateItem($event)">Update</button>
          <button type="submit" class="mx-1 btn btn-primary"
                  (click)="createItem($event)">Create</button>
          <button type="button" class="mx-1 btn btn-secondary" (click)="deleteItem()">Delete</button>
          <button type="reset" class="mx-1 btn btn-secondary" (click)="cancel($event)">Cancel</button>
        </div>
      </form>
    </div>
    <div class="col-xs-12 col-xl-6">
      <button type="button" class="mx-1 btn btn-secondary" (click)="refresh()">Refresh</button>
      <ag-grid-angular
        style="width: 100%; height: 550px;"
        [rowData]="rowData"
        [columnDefs]="colDefs"
        (gridReady)="onGridReady($event)"
        [theme]="themeBalham"
        (selectionChanged)="onSelectionChanged($event)"
        [rowSelection]="rowSelection"
      />
    </div>
  </div>
</div>
