<div class="container-fluid">
  <div class="row row-content">
    <div class="col-xs-12">
      <form>
        <fieldset class="form-group">
          <input type="text" class="form-control" placeholder="Name" [formField]="searchForm"
                 #searchname (keyup.enter)="getItems()"
                 (blur)="getItems()">
        </fieldset>
      </form>
    </div>
  </div>
</div>
<div class="container-fluid">
  <div class="row row-content">
    <div class="col-xs-12 col-xl-6">
      <h1>Attributes</h1>
      <ag-grid-angular
        style="width: 100%; height: 550px;"
        [rowData]="rowData"
        [columnDefs]="colDefs"
        (gridReady)="onGridReady($event)"
        [theme]="themeBalham"
        (selectionChanged)="onSelectionChanged($event)"
        [rowSelection]="rowSelection"
      />
      <h1>Attribute {{ attributeModel().name }}</h1>
      <form novalidate>
        <fieldset class="form-group">
          <label for="id">Id</label>
          <input type="number" class="form-control" id="id" [formField]="form.id">
        </fieldset>
        <fieldset class="form-group">
          <label for="name">Name</label>
          <input type="text" class="form-control" id="name" [formField]="form.name">
        </fieldset>
        <fieldset class="form-group">
          <label for="value">Value</label>
          <input type="text" class="form-control" id="value" [formField]="form.value">
        </fieldset>
        <fieldset class="form-group">
          <label for="valueType">Type</label>
          <input type="text" class="form-control" id="valueType" [formField]="form.valueType">
        </fieldset>
        <div class="col-xs-12 col-sm-12 text-right">
          <button type="submit" class="mx-1 btn btn-primary"
                  (click)="updateItem($event)">Update
          </button>
          <button type="submit"
                  class="mx-1 btn btn-primary" (click)="createItem($event)">Create
          </button>
          <button type="button" class="mx-1 btn btn-secondary" (click)="deleteItem()">Delete</button>
          <button type="reset" class="mx-1 btn btn-secondary" (click)="cancel($event)">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
