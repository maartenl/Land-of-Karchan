<div class="container-fluid">
  <div class="row row-content">
    <div class="col-xs-12 col-xl-6">
      <h3>Compose Blog</h3>
      <form novalidate>
        <fieldset class="form-group">
          <label for="title">Title</label>
          <input type="text" class="form-control" id="title" [formField]="form.title">
        </fieldset>
        <fieldset class="form-group">
          <label for="urlTitle">URL</label>
          <input type="text" class="form-control" id="urlTitle" [formField]="form.urlTitle">
          <small id="urlTitle" class="form-text text-muted">Only alphanumeric in small caps and dashes, please. For example: 'upgrade-postponed-indefinitely'.</small>
        </fieldset>
        <div class="card">
          <div class="card-header">
            Contents
          </div>
          <div class="card-text" [innerHTML]="blogModel().contents">
          </div>
        </div>
        <fieldset class="form-group">
          <label for="body">Contents</label>
          <textarea class="form-control" id="contents" rows="13" [formField]="form.contents"></textarea>
          <small id="contents" class="form-text text-muted">First letter will automatically be turned into a calligraphic picture.</small>
        </fieldset>
        <div class="col-xs-12 col-sm-12 text-right">
          <button type="submit" class="mx-1 btn btn-primary"
                  (click)="createItem($event)">Create
          </button>
          <button type="button" class="mx-1 btn btn-secondary" (click)="deleteItem()">Delete</button>
          <button type="reset" class="mx-1 btn btn-secondary" (click)="cancel($event)">Cancel</button>
        </div>
      </form>
    </div>
    <div class="col-xs-12 col-xl-6">
      <ag-grid-angular
        style="width: 100%; height: 500px;"
        [rowData]="rowData"
        [columnDefs]="colDefs"
        (gridReady)="onGridReady($event)"
        [theme]="themeBalham"
        (selectionChanged)="onSelectionChanged($event)"
        [rowSelection]="rowSelection"
      />
    </div>
  </div>
</div>
