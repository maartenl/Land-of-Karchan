<div class="container-fluid">
  <div class="row row-content">
    <div class="col-xs-12 col-xl-6">
      <h1>Banned address {{ item().address }}</h1>
      <form novalidate>
        <fieldset class="form-group">
          <label for="address">Address</label>
          <input type="text" class="form-control" id="address" [formField]="form.address">
        </fieldset>
        <fieldset class="form-group">
          <label for="IP">IP</label>
          <input type="text" class="form-control" id="IP" [formField]="form.IP">
        </fieldset>
        <fieldset class="form-group">
          <label for="days">Days</label>
          <input type="number" class="form-control" id="days" [formField]="form.days">
        </fieldset>
        <fieldset class="form-group">
          <label for="name">Name</label>
          <input type="text" class="form-control" id="name" [formField]="form.name">
        </fieldset>
        <fieldset class="form-group">
          <label for="deputy">Deputy</label>
          <input type="text" class="form-control" id="deputy" [formField]="form.deputy">
        </fieldset>
        <fieldset class="form-group">
          <label for="reason">Reason</label>
          <input type="text" class="form-control" id="reason" [formField]="form.reason">
        </fieldset>
        <div class="col-xs-12 col-sm-12 text-right">
          <button type="submit" class="mx-1 btn btn-primary"
                  (click)="createItem($event)">Create
          </button>
          <button type="button" class="mx-1 btn btn-secondary" (click)="deleteItem()">Delete</button>
          <button type="reset" class="mx-1 btn btn-secondary" (click)="cancel($event)">Cancel</button>
        </div>
      </form>
    </div>
    <div class="col-xs-12 col-xl-6">
      <ag-grid-angular
        style="width: 100%; height: 550px;"
        [rowData]="rowData"
        [columnDefs]="colDefs"
        (gridReady)="onGridReady($event)"
        [theme]="themeBalham"
        (selectionChanged)="onSelectionChanged($event)"
        [rowSelection]="rowSelection"
      />
    </div>
  </div>
</div>
