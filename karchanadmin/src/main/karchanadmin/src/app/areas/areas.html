<div class="container-fluid">
  <div class="row row-content">
    <div class="col-xs-12 col-xl-6">
      <h1>Area {{ item().area }}</h1>
      <form novalidate>
        <fieldset class="form-group">
          <label for="area">Area</label>
          <input type="text" class="form-control" id="area" [formField]="form.area">
        </fieldset>
        <fieldset class="form-group">
          <label for="shortdesc">Short description</label>
          <input type="text" class="form-control" id="shortdesc" [formField]="form.shortdesc">
          <div id="activeHelp" class="form-text">This is what will be visible to the user (in the who list).
          </div>
        </fieldset>
        <fieldset class="form-group">
          <label for="description">Description</label>
          <input type="text" class="form-control" id="description" [formField]="form.description">
        </fieldset>
        <fieldset class="form-group">
          <label for="owner">Owner</label>
          <input type="text" class="form-control" id="owner" [formField]="form.owner">
        </fieldset>
        <div class="col-xs-12 col-sm-12 text-right">
          <button type="submit" class="mx-1 btn btn-primary"
                  (click)="updateItem($event)">Update</button>
          <button type="submit" class="mx-1 btn btn-primary"
                  (click)="createItem($event)">Create</button>
          <button type="button" class="mx-1 btn btn-secondary" (click)="deleteItem()">Delete</button>
          <button type="reset" class="mx-1 btn btn-secondary" (click)="cancel($event)">Cancel</button>
        </div>
      </form>
    </div>
    <div class="col-xs-12 col-xl-6">
      <button type="button" class="mx-1 btn btn-secondary" (click)="refresh()">Refresh</button>
      <ag-grid-angular
        style="width: 100%; height: 550px;"
        [rowData]="rowData"
        [columnDefs]="colDefs"
        (gridReady)="onGridReady($event)"
        [theme]="themeBalham"
        (selectionChanged)="onSelectionChanged($event)"
        [rowSelection]="rowSelection"
      />
    </div>
  </div>
</div>
