<h2>Attributes</h2>
<ag-grid-angular
  style="width: 100%; height: 220px;"
  [rowData]="attributeinstances()"
  [columnDefs]="colDefs"
  [theme]="themeBalham"
  (selectionChanged)="onSelectionChanged($event)"
  [rowSelection]="rowSelection"
/>
<h1>Attribute {{ attributeModel().name }}</h1>
<form novalidate>
  <fieldset class="form-group">
    <label for="id">Id</label>
    <input type="number" readonly class="form-control" id="id" [value]="attributeModel().id">
  </fieldset>
  <fieldset class="form-group">
    <label for="name">Name</label>
    <input type="text" class="form-control" id="attrname" [formField]="attributeForm.name">
  </fieldset>
  <fieldset class="form-group">
    <label for="value">Value</label>
    <input type="text" class="form-control" id="value" [formField]="attributeForm.value">
  </fieldset>
  <fieldset class="form-group">
    <label for="valueType">Type</label>
    <input type="text" class="form-control" id="valueType" [formField]="attributeForm.valueType">
  </fieldset>
  <div class="col-xs-12 col-sm-12 text-right">
    <button type="submit" class="mx-1 btn btn-primary"
            (click)="updateAttribute($event)">Update
    </button>
    <button type="submit" class="mx-1 btn btn-primary"
            (click)="createAttribute()">Create
    </button>
    <button type="button" class="mx-1 btn btn-secondary" (click)="deleteAttribute()">Delete</button>
  </div>
</form>
