<hr/>
<div class="row">
  <div class="d-grid gap-2 d-md-flex justify-content-md-end">
    <a class="btn btn-primary btn-sm " href="#" (click)="clearLog();"
    title="Clears your log">Clear</a>
    <a class="btn btn-primary btn-sm " href="#" (click)="resetLog();"
    title="Reset your log">Reset</a>
  </div>
</div>
<div id="karchan_log" [innerHTML]="getLog()"></div>
@for (message of getMessages(); track message) {
  <div [innerHTML]="message.content">
  </div>
}

<p>&nbsp;</p>
