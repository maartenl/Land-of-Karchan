<div class="container">
  <div class="row row-content">
    <div class="col-xs-12 col-sm-12">
      <table class="table table-sm table-striped table-bordered">
        <thead class="thead-inverse">
        <tr>
          <th>To</th>
          <th>Subject</th>
          <th>When</th>
        </tr>
        </thead>
        <tbody>
          @for (mail of mails(); track mail) {
            <tr>
              <td (click)="setMail(mail)">{{ mail.toname }}</td>
              <td (click)="setMail(mail)">{{ mail.subject }}</td>
              <td (click)="setMail(mail)">{{ mail.whensent | date:'medium' }}</td>
            </tr>
          }
        </tbody>
      </table>
      <nav aria-label="...">
        <ul class="pagination">
          <li class="page-item">
            <a class="page-link" href="#" tabindex="-1" (click)="previous()">Previous</a>
          </li>
          @for (header of getMailList().generatePages(); track header) {
            <li class="page-item" (click)="setPage(header-1)" [ngClass]="{active: getMailList().page === (header-1)}"
            ><a class="page-link" href="#">{{ header }}</a></li>
          }
          <li class="page-item">
            <a class="page-link" href="#" (click)="next()">Next</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
<app-show-mail></app-show-mail>
